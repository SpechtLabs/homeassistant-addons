name: "Grafana Alloy"
description: "Send metrics, logs & traces to Grafana Cloud or your own Grafana observability stack"
version: "0.2.0"
slug: "grafana_alloy"
init: false
arch:
  - amd64
  - aarch64
options:
  instance_name: homeassistant
  scrape_interval: 60s
  log_level: info
schema:
  loki_endpoint: str?
  loki_username: str?
  loki_password: password?
  mimir_endpoint: str?
  mimir_username: str?
  mimir_password: password?
  tempo_endpoint: str?
  tempo_username: str?
  tempo_password: password?
  tenant_id: str?
  instance_name: str?
  scrape_interval: str?
  log_level: list(debug|info|warn|error)
ports:
  4317/tcp: null
  4318/tcp: null
ports_description:
  4317/tcp: "OTLP/gRPC traces receiver (only used when tempo_endpoint is set)"
  4318/tcp: "OTLP/HTTP traces receiver (only used when tempo_endpoint is set)"
homeassistant_api: true
map:
  - type: homeassistant_config
    path: /custom/config
    read_only: true
  - type: addon_config
    read_only: false
image: "ghcr.io/spechtlabs/hass-addon-grafana-alloy-{arch}"
